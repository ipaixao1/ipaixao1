<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 200" width="860" height="200" shape-rendering="crispEdges">
<defs>
  <style>
    /* ── GROUND SCROLL ── */
    .ground-tiles { animation: groundScroll 8s linear infinite; }
    @keyframes groundScroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-64px); }
    }

    /* ── HORNET RUN CYCLE ── */
    .leg-l { animation: legL 0.35s steps(1) infinite; }
    .leg-r { animation: legR 0.35s steps(1) infinite; }
    @keyframes legL {
      0%,49% { transform: translateY(0); }
      50%,100%{ transform: translateY(2px); }
    }
    @keyframes legR {
      0%,49% { transform: translateY(2px); }
      50%,100%{ transform: translateY(0); }
    }
    .cape-run { animation: capeR 0.35s steps(1) infinite; }
    @keyframes capeR {
      0%,49% { transform: skewX(-3deg); }
      50%,100%{ transform: skewX(3deg); }
    }
    .needle-run { animation: needleR 0.7s ease-in-out infinite; transform-box:fill-box; transform-origin:right center; }
    @keyframes needleR {
      0%,100%{ transform: rotate(-5deg); }
      50%    { transform: rotate(5deg); }
    }

    /* ── BAR GROW (staggered) ── */
    .bar { transform-box:fill-box; transform-origin:bottom center; animation: barGrow 0.6s cubic-bezier(0.22,1,0.36,1) both; }
    .b0 {animation-delay:0.1s} .b1{animation-delay:0.2s} .b2{animation-delay:0.3s}
    .b3 {animation-delay:0.4s} .b4{animation-delay:0.5s} .b5{animation-delay:0.6s}
    .b6 {animation-delay:0.7s} .b7{animation-delay:0.8s} .b8{animation-delay:0.9s}
    .b9 {animation-delay:1.0s} .b10{animation-delay:1.1s} .b11{animation-delay:1.2s}
    @keyframes barGrow {
      from { transform: scaleY(0); opacity:0; }
      to   { transform: scaleY(1); opacity:1; }
    }

    /* ── COIN COLLECT ── */
    .coin { animation: coinFloat 1.5s ease-in-out infinite; transform-box:fill-box; transform-origin:center center; }
    .c0{animation-delay:0s} .c1{animation-delay:0.4s} .c2{animation-delay:0.8s}
    .c3{animation-delay:1.2s} .c4{animation-delay:1.6s} .c5{animation-delay:0.2s}
    @keyframes coinFloat {
      0%,100%{ transform: translateY(0) rotate(0deg); opacity:1; }
      50%    { transform: translateY(-5px) rotate(8deg); opacity:0.8; }
    }

    /* ── STAR TWINKLE ── */
    .star { animation: starT 2s ease-in-out infinite; }
    .st0{animation-delay:0s} .st1{animation-delay:0.6s} .st2{animation-delay:1.2s}
    .st3{animation-delay:0.3s} .st4{animation-delay:0.9s}
    @keyframes starT {
      0%,100%{ opacity:0.2; transform:scale(0.6); }
      50%    { opacity:0.9; transform:scale(1); }
    }

    /* ── TITLE BLINK ── */
    .score-val { animation: scoreP 0.8s steps(1) 3; }
    @keyframes scoreP { 0%,49%{fill:#C8102E} 50%,100%{fill:#D8CAB4} }

    /* labels */
    .lbl { font-family:'Courier New',monospace; font-size:9px; fill:#8A7D6E; letter-spacing:1px; }
    .lbl-month { font-family:'Courier New',monospace; font-size:8px; fill:#8A7D6E; }
    .score-lbl { font-family:'Courier New',monospace; font-size:10px; fill:#C8102E; letter-spacing:2px; }
    .score-num { font-family:'Courier New',monospace; font-size:18px; font-weight:bold; fill:#D8CAB4; letter-spacing:1px; }
    .title-txt { font-family:'Courier New',monospace; font-size:11px; fill:#C8102E; letter-spacing:3px; }
  </style>
</defs>

