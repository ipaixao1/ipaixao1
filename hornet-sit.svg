<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 72" width="120" height="144" shape-rendering="crispEdges">
<rect width="60" height="72" fill="transparent"/>
<!-- horns (relaxed, slightly drooped) -->
<rect x="22" y="2"  width="2" height="6" fill="#D0C4AE"/>
<rect x="20" y="4"  width="2" height="3" fill="#D0C4AE"/>
<rect x="36" y="2"  width="2" height="6" fill="#D0C4AE"/>
<rect x="38" y="4"  width="2" height="3" fill="#D0C4AE"/>
<!-- mask (slightly smaller — cozy) -->
<rect x="18" y="8"  width="24" height="20" fill="#E2D6C0"/>
<rect x="16" y="10" width="2"  height="16" fill="#C8BAA2"/>
<rect x="42" y="10" width="2"  height="16" fill="#C8BAA2"/>
<rect x="18" y="8"  width="24" height="2"  fill="#D4C6B0"/>
<rect x="18" y="26" width="24" height="2"  fill="#B8AA92"/>
<rect x="20" y="14" width="20" height="1"  fill="#C8BAA2" opacity="0.35"/>
<rect x="20" y="18" width="20" height="1"  fill="#C8BAA2" opacity="0.25"/>
<!-- eyes (half-closed — resting) -->
<rect x="20" y="16" width="8" height="6" fill="#06020A"/>
<rect x="32" y="16" width="8" height="6" fill="#06020A"/>
<!-- sleepy lid overlay -->
<rect x="20" y="16" width="8" height="2" fill="#C8BAA2" opacity="0.55"/>
<rect x="32" y="16" width="8" height="2" fill="#C8BAA2" opacity="0.55"/>
<rect x="20" y="16" width="3" height="2" fill="#8B0A1F" opacity="0.6"/>
<rect x="32" y="16" width="3" height="2" fill="#8B0A1F" opacity="0.6"/>
<!-- body -->
<rect x="22" y="28" width="16" height="12" fill="#0C0418"/>
<!-- cape (gathered/sitting) -->
<rect x="12" y="30" width="36" height="30" fill="#6B0A1A"/>
<rect x="12" y="30" width="16" height="30" fill="#9B1428"/>
<rect x="10" y="32" width="2"  height="26" fill="#4A0812"/>
<rect x="48" y="32" width="2"  height="26" fill="#4A0812"/>
<rect x="14" y="32" width="2"  height="26" fill="#C8102E" opacity="0.35"/>
<!-- cape pooling at bottom (sitting) -->
<rect x="8"  y="56" width="44" height="4" fill="#4A0812" opacity="0.7"/>
<rect x="6"  y="58" width="48" height="4" fill="#3A0810" opacity="0.5"/>
<!-- little legs visible -->
<rect x="20" y="58" width="6" height="6" fill="#0C0418"/>
<rect x="34" y="58" width="6" height="6" fill="#0C0418"/>
<rect x="18" y="60" width="4" height="4" fill="#140820"/>
<rect x="38" y="60" width="4" height="4" fill="#140820"/>
<!-- needle resting on ground beside -->
<rect x="48" y="54" width="2" height="14" fill="#C8C0A0"/>
<rect x="47" y="53" width="4" height="3"  fill="#D8D0B0"/>
<!-- ground shadow -->
<rect x="10" y="66" width="48" height="2" fill="#06020A" opacity="0.4"/>
<rect x="14" y="68" width="40" height="1" fill="#06020A" opacity="0.25"/>
<!-- silk thread beside -->
<rect x="48" y="60" width="10" height="1" fill="#D8CAB4" opacity="0.35"/>
<rect x="50" y="63" width="8"  height="1" fill="#D8CAB4" opacity="0.25"/>
<!-- idle subtle breath animation -->
<animateTransform attributeName="transform" type="translate" values="0,0; 0,-1; 0,0" dur="3s" repeatCount="indefinite"/>
</svg>
