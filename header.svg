<svg fill="none" viewBox="0 0 800 200" width="800" height="200" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&amp;family=VT323&amp;display=swap');

    .bg { animation: bgPulse 6s ease-in-out infinite; }
    @keyframes bgPulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.85; }
    }

    /* Stalactites drop-in */
    .stal { animation: stalDrop 1.2s cubic-bezier(0.22,1,0.36,1) both; transform-origin: top center; }
    .stal1 { animation-delay: 0.0s; }
    .stal2 { animation-delay: 0.1s; }
    .stal3 { animation-delay: 0.2s; }
    .stal4 { animation-delay: 0.3s; }
    .stal5 { animation-delay: 0.4s; }
    .stal6 { animation-delay: 0.15s; }
    .stal7 { animation-delay: 0.25s; }
    @keyframes stalDrop {
      from { transform: scaleY(0); opacity: 0; }
      to   { transform: scaleY(1); opacity: 1; }
    }

    /* Drip animation */
    .drip { animation: dripFall 3s ease-in infinite; }
    .drip1 { animation-delay: 0.8s; }
    .drip2 { animation-delay: 2.1s; }
    .drip3 { animation-delay: 1.4s; }
    @keyframes dripFall {
      0%   { transform: translateY(0);   opacity: 0; }
      10%  { opacity: 1; }
      80%  { opacity: 0.6; }
      100% { transform: translateY(40px); opacity: 0; }
    }

    /* Silk threads float */
    .thread { animation: threadFloat 4s ease-in-out infinite; }
    .thread1 { animation-delay: 0s;   animation-duration: 5s; }
    .thread2 { animation-delay: 0.8s; animation-duration: 4.5s; }
    .thread3 { animation-delay: 1.6s; animation-duration: 6s; }
    .thread4 { animation-delay: 0.4s; animation-duration: 4s; }
    @keyframes threadFloat {
      0%,100% { transform: translateY(0) scaleX(1); opacity: 0.35; }
      50%      { transform: translateY(-6px) scaleX(1.04); opacity: 0.6; }
    }

    /* Spores float up */
    .spore { animation: sporeRise linear infinite; }
    .sp1 { animation-delay: 0s;   animation-duration: 5s; }
    .sp2 { animation-delay: 1.2s; animation-duration: 6.5s; }
    .sp3 { animation-delay: 2.5s; animation-duration: 4.8s; }
    .sp4 { animation-delay: 3.8s; animation-duration: 7s; }
    .sp5 { animation-delay: 0.7s; animation-duration: 5.5s; }
    @keyframes sporeRise {
      0%   { transform: translateY(0)    scale(0.3); opacity: 0; }
      15%  { opacity: 0.7; }
      85%  { opacity: 0.2; }
      100% { transform: translateY(-90px) scale(1.2); opacity: 0; }
    }

    /* Title reveal */
    .title-main {
      font-family: 'Cinzel', 'Georgia', serif;
      font-size: 46px;
      font-weight: 700;
      fill: #D8CAB4;
      letter-spacing: 6px;
      animation: titleReveal 1s 0.6s both;
      filter: drop-shadow(0 0 18px rgba(200,16,46,0.55)) drop-shadow(0 0 6px rgba(200,16,46,0.3));
    }
    .title-sub {
      font-family: 'VT323', 'Courier New', monospace;
      font-size: 18px;
      fill: #8A7D6E;
      letter-spacing: 5px;
      animation: titleReveal 1s 0.9s both;
    }
    .title-tag {
      font-family: 'VT323', 'Courier New', monospace;
      font-size: 14px;
      fill: #C8102E;
      letter-spacing: 4px;
      animation: titleReveal 1s 1.1s both;
    }
    @keyframes titleReveal {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Red gem pulse */
    .gem { animation: gemPulse 2.5s ease-in-out infinite; }
    @keyframes gemPulse {
      0%,100% { transform: scale(1)   rotate(45deg); filter: drop-shadow(0 0 6px #C8102E); }
      50%      { transform: scale(1.2) rotate(45deg); filter: drop-shadow(0 0 14px #C8102E); }
    }
    .gem-left  { animation-delay: 0s; }
    .gem-right { animation-delay: 1.25s; }

    /* Needle float */
    .needle { animation: needleFloat 4s ease-in-out infinite; }
    @keyframes needleFloat {
      0%,100% { transform: rotate(-38deg) translateY(0); }
      50%      { transform: rotate(-38deg) translateY(-4px); }
    }

    /* Corner brackets slide in */
    .corner-tl { animation: cornerTL 0.7s 0.3s cubic-bezier(0.22,1,0.36,1) both; }
    .corner-tr { animation: cornerTR 0.7s 0.3s cubic-bezier(0.22,1,0.36,1) both; }
    .corner-bl { animation: cornerBL 0.7s 0.3s cubic-bezier(0.22,1,0.36,1) both; }
    .corner-br { animation: cornerBR 0.7s 0.3s cubic-bezier(0.22,1,0.36,1) both; }
    @keyframes cornerTL { from { transform: translate(-8px,-8px); opacity:0; } to { transform:translate(0,0); opacity:1; } }
    @keyframes cornerTR { from { transform: translate(8px,-8px);  opacity:0; } to { transform:translate(0,0); opacity:1; } }
    @keyframes cornerBL { from { transform: translate(-8px,8px);  opacity:0; } to { transform:translate(0,0); opacity:1; } }
    @keyframes cornerBR { from { transform: translate(8px,8px);   opacity:0; } to { transform:translate(0,0); opacity:1; } }

    /* Border glow pulse */
    .border-glow { animation: borderGlow 3s ease-in-out infinite; }
    @keyframes borderGlow {
      0%,100% { opacity: 0.35; }
      50%      { opacity: 0.7; }
    }
  </style>

  <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#06030A"/>
    <stop offset="100%" stop-color="#130820"/>
  </linearGradient>
  <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="transparent"/>
    <stop offset="50%"  stop-color="#C8102E"/>
    <stop offset="100%" stop-color="transparent"/>
  </linearGradient>
  <radialGradient id="heroGlow" cx="50%" cy="60%" r="45%">
    <stop offset="0%"   stop-color="#8B0A1F" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#06030A" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="lavGlow" cx="20%" cy="30%" r="25%">
    <stop offset="0%"   stop-color="#7B6FC8" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
  </radialGradient>
</defs>

<!-- Background -->
<rect width="800" height="200" fill="url(#bgGrad)" class="bg"/>
<rect width="800" height="200" fill="url(#heroGlow)"/>
<rect width="800" height="200" fill="url(#lavGlow)"/>

<!-- Subtle grid overlay -->
<g opacity="0.03" stroke="#D8CAB4" stroke-width="0.5">
  <line x1="0"   y1="50"  x2="800" y2="50"/>
  <line x1="0"   y1="100" x2="800" y2="100"/>
  <line x1="0"   y1="150" x2="800" y2="150"/>
  <line x1="100" y1="0"   x2="100" y2="200"/>
  <line x1="200" y1="0"   x2="200" y2="200"/>
  <line x1="300" y1="0"   x2="300" y2="200"/>
  <line x1="400" y1="0"   x2="400" y2="200"/>
  <line x1="500" y1="0"   x2="500" y2="200"/>
  <line x1="600" y1="0"   x2="600" y2="200"/>
  <line x1="700" y1="0"   x2="700" y2="200"/>
</g>

<!-- Outer border glow -->
<rect x="1" y="1" width="798" height="198" fill="none" stroke="#C8102E" stroke-width="1" class="border-glow"/>

<!-- Corner brackets -->
<g class="corner-tl" stroke="#C8102E" stroke-width="1.5" fill="none">
  <line x1="12" y1="12" x2="38" y2="12"/>
  <line x1="12" y1="12" x2="12" y2="38"/>
</g>
<g class="corner-tr" stroke="#C8102E" stroke-width="1.5" fill="none">
  <line x1="788" y1="12" x2="762" y2="12"/>
  <line x1="788" y1="12" x2="788" y2="38"/>
</g>
<g class="corner-bl" stroke="#C8102E" stroke-width="1.5" fill="none">
  <line x1="12" y1="188" x2="38" y2="188"/>
  <line x1="12" y1="188" x2="12" y2="162"/>
</g>
<g class="corner-br" stroke="#C8102E" stroke-width="1.5" fill="none">
  <line x1="788" y1="188" x2="762" y2="188"/>
  <line x1="788" y1="188" x2="788" y2="162"/>
</g>

<!-- Stalactites top -->
<g class="stal stal1" transform-origin="55 0"><path d="M45,0 L55,55 L65,0" fill="#0D0614"/><line x1="55" y1="55" x2="55" y2="65" stroke="rgba(216,202,180,0.2)" stroke-width="0.6"/><circle cx="55" cy="66" r="2" fill="rgba(216,202,180,0.15)"/></g>
<g class="stal stal2" transform-origin="145 0"><path d="M135,0 L145,42 L155,0" fill="#0D0614"/><line x1="145" y1="42" x2="145" y2="50" stroke="rgba(216,202,180,0.15)" stroke-width="0.6"/></g>
<g class="stal stal3" transform-origin="265 0"><path d="M252,0 L265,68 L278,0" fill="#0D0614"/><line x1="265" y1="68" x2="265" y2="80" stroke="rgba(200,16,46,0.3)" stroke-width="0.7"/><circle cx="265" cy="82" r="2.5" fill="rgba(200,16,46,0.25)"/></g>
<g class="stal stal4" transform-origin="400 0"><path d="M388,0 L400,48 L412,0" fill="#0D0614"/></g>
<g class="stal stal5" transform-origin="530 0"><path d="M518,0 L530,72 L542,0" fill="#0D0614"/><line x1="530" y1="72" x2="530" y2="84" stroke="rgba(216,202,180,0.2)" stroke-width="0.6"/><circle cx="530" cy="86" r="2" fill="rgba(216,202,180,0.15)"/></g>
<g class="stal stal6" transform-origin="648 0"><path d="M638,0 L648,38 L658,0" fill="#0D0614"/></g>
<g class="stal stal7" transform-origin="745 0"><path d="M735,0 L745,58 L755,0" fill="#0D0614"/><line x1="745" y1="58" x2="745" y2="68" stroke="rgba(216,202,180,0.18)" stroke-width="0.6"/></g>

<!-- Drips -->
<circle class="drip drip1" cx="265" cy="83" r="2" fill="rgba(200,16,46,0.4)"/>
<circle class="drip drip2" cx="55"  cy="66" r="1.5" fill="rgba(216,202,180,0.3)"/>
<circle class="drip drip3" cx="530" cy="86" r="1.8" fill="rgba(216,202,180,0.25)"/>

<!-- Silk threads -->
<path class="thread thread1" d="M60,100 Q140,85 220,105 Q300,125 380,100" fill="none" stroke="rgba(216,202,180,0.25)" stroke-width="0.8"/>
<path class="thread thread2" d="M420,90 Q500,75 580,95 Q660,115 740,90" fill="none" stroke="rgba(216,202,180,0.2)" stroke-width="0.8"/>
<path class="thread thread3" d="M30,140 Q120,128 200,145 Q300,162 400,140" fill="none" stroke="rgba(200,16,46,0.18)" stroke-width="0.7"/>
<path class="thread thread4" d="M400,155 Q500,140 600,158 Q700,175 780,155" fill="none" stroke="rgba(216,202,180,0.15)" stroke-width="0.7"/>

<!-- Floating spores -->
<circle class="spore sp1" cx="80"  cy="160" r="1.5" fill="rgba(216,202,180,0.6)"/>
<circle class="spore sp2" cx="220" cy="170" r="1"   fill="rgba(216,202,180,0.5)"/>
<circle class="spore sp3" cx="600" cy="165" r="1.8" fill="rgba(216,202,180,0.55)"/>
<circle class="spore sp4" cx="710" cy="155" r="1.2" fill="rgba(200,16,46,0.5)"/>
<circle class="spore sp5" cx="350" cy="172" r="1"   fill="rgba(216,202,180,0.4)"/>

<!-- Needle weapon (left side) -->
<g class="needle" transform="translate(75,110)">
  <line x1="0" y1="0" x2="-42" y2="-52" stroke="#C8C0A0" stroke-width="2" stroke-linecap="round"/>
  <line x1="0" y1="0" x2="-42" y2="-52" stroke="rgba(216,202,180,0.25)" stroke-width="5" stroke-linecap="round"/>
  <ellipse cx="-42" cy="-52" rx="4" ry="4" fill="#C8C0A0"/>
  <!-- thread from needle -->
  <path d="M0,0 Q30,10 70,0 Q110,-10 160,5" fill="none" stroke="rgba(216,202,180,0.3)" stroke-width="0.7"/>
</g>

<!-- Decorative red horizontal line center -->
<rect x="200" y="99" width="400" height="1" fill="url(#redGrad)" opacity="0.4"/>

<!-- Gem ornaments flanking title -->
<rect class="gem gem-left"  x="176" y="92" width="10" height="10" fill="#C8102E" transform="rotate(45 181 97)"/>
<rect class="gem gem-right" x="614" y="92" width="10" height="10" fill="#C8102E" transform="rotate(45 619 97)"/>

<!-- Main title text -->
<text x="400" y="90" text-anchor="middle" class="title-tag">[ DESENVOLVEDORA FRONT-END ]</text>
<text x="400" y="132" text-anchor="middle" class="title-main">Isabel Paixão</text>
<text x="400" y="158" text-anchor="middle" class="title-sub">Angular · TypeScript · SCSS · Firebase</text>

<!-- HUD status dot bottom right -->
<circle cx="770" cy="178" r="4" fill="#C8102E" opacity="0.8">
  <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.5s" repeatCount="indefinite"/>
</circle>
<text x="762" y="182" text-anchor="end" font-family="'Courier New',monospace" font-size="9" fill="#C8102E" letter-spacing="2" opacity="0.7">ONLINE</text>

<!-- HUD version bottom left -->
<text x="28" y="182" font-family="'Courier New',monospace" font-size="9" fill="rgba(138,125,110,0.6)" letter-spacing="2">v1.0 · 2025</text>
</svg>
