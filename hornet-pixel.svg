<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" width="128" height="160" shape-rendering="crispEdges">
<rect width="64" height="80" fill="transparent"/>
<!-- horns -->
<rect x="24" y="2" width="2" height="8" fill="#D0C4AE"/>
<rect x="22" y="4" width="2" height="2" fill="#D0C4AE"/>
<rect x="20" y="6" width="2" height="2" fill="#D0C4AE"/>
<rect x="38" y="2" width="2" height="8" fill="#D0C4AE"/>
<rect x="40" y="4" width="2" height="2" fill="#D0C4AE"/>
<rect x="42" y="6" width="2" height="2" fill="#D0C4AE"/>
<!-- horn rings -->
<rect x="23" y="7" width="3" height="1" fill="#C8A44A" opacity="0.8"/>
<rect x="38" y="7" width="3" height="1" fill="#C8A44A" opacity="0.8"/>
<!-- mask outer -->
<rect x="20" y="10" width="24" height="22" fill="#E2D6C0"/>
<!-- mask sides bevel -->
<rect x="18" y="12" width="2" height="18" fill="#C8BAA2"/>
<rect x="44" y="12" width="2" height="18" fill="#C8BAA2"/>
<rect x="20" y="10" width="24" height="2" fill="#D4C6B0"/>
<rect x="20" y="30" width="24" height="2" fill="#B8AA92"/>
<!-- mask texture lines -->
<rect x="22" y="16" width="20" height="1" fill="#C8BAA2" opacity="0.4"/>
<rect x="22" y="20" width="20" height="1" fill="#C8BAA2" opacity="0.35"/>
<rect x="22" y="24" width="20" height="1" fill="#C8BAA2" opacity="0.25"/>
<!-- crack -->
<rect x="35" y="11" width="1" height="4" fill="#8B0A1F" opacity="0.5"/>
<rect x="34" y="14" width="1" height="3" fill="#8B0A1F" opacity="0.4"/>
<!-- eyes -->
<rect x="22" y="18" width="8" height="10" fill="#06020A"/>
<rect x="34" y="18" width="8" height="10" fill="#06020A"/>
<!-- eye glow -->
<rect x="22" y="18" width="3" height="3" fill="#8B0A1F" opacity="0.8"/>
<rect x="34" y="18" width="3" height="3" fill="#8B0A1F" opacity="0.8"/>
<!-- eye shine -->
<rect x="28" y="18" width="2" height="2" fill="#1A0A28" opacity="0.5"/>
<rect x="40" y="18" width="2" height="2" fill="#1A0A28" opacity="0.5"/>
<!-- body -->
<rect x="24" y="32" width="16" height="16" fill="#0C0418"/>
<rect x="22" y="34" width="2" height="12" fill="#140820"/>
<rect x="40" y="34" width="2" height="12" fill="#140820"/>
<!-- collar ornament -->
<rect x="28" y="32" width="8" height="2" fill="#C8A44A" opacity="0.5"/>
<rect x="30" y="31" width="4" height="1" fill="#C8A44A" opacity="0.4"/>
<!-- cape -->
<rect x="14" y="36" width="36" height="28" fill="#6B0A1A"/>
<rect x="14" y="36" width="14" height="28" fill="#9B1428"/>
<rect x="12" y="38" width="2" height="24" fill="#4A0812"/>
<rect x="50" y="38" width="2" height="24" fill="#4A0812"/>
<!-- cape highlight fold -->
<rect x="16" y="38" width="2" height="24" fill="#C8102E" opacity="0.35"/>
<!-- cape bottom trim -->
<rect x="14" y="62" width="36" height="2" fill="#8B0A1F"/>
<rect x="16" y="64" width="32" height="2" fill="#4A0812" opacity="0.5"/>
<!-- needle -->
<rect x="8" y="44" width="14" height="2" fill="#C8C0A0" transform="rotate(-35 15 45)"/>
<rect x="6" y="53" width="3" height="3" fill="#C8C0A0"/>
<rect x="5" y="52" width="2" height="2" fill="#D8D0B0"/>
<!-- needle guard -->
<rect x="20" y="43" width="4" height="6" fill="#1A1030" opacity="0.8"/>
<!-- silk threads from needle -->
<rect x="4" y="52" width="10" height="1" fill="#D8CAB4" opacity="0.4"/>
<rect x="2" y="55" width="12" height="1" fill="#D8CAB4" opacity="0.3"/>
<rect x="4" y="58" width="8"  height="1" fill="#D8CAB4" opacity="0.2"/>
<!-- foot peeks -->
<rect x="24" y="64" width="6" height="4" fill="#0C0418"/>
<rect x="34" y="64" width="6" height="4" fill="#0C0418"/>
<rect x="22" y="66" width="4" height="2" fill="#140820"/>
<rect x="38" y="66" width="4" height="2" fill="#140820"/>
<!-- idle bob animation -->
<animateTransform attributeName="transform" type="translate" values="0,0; 0,-2; 0,0" dur="2s" repeatCount="indefinite"/>
</svg>
